services:
  - type: web
    name: dating-system
    env: java
    plan: starter
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/dating-system-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dating-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: dating-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: dating-db
          property: password
      - key: DEEPSEEK_API_KEY
        value: YOUR_DEEPSEEK_API_KEY_HERE
      - key: JWT_SECRET
        generateValue: true
