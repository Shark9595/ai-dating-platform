server.port=${PORT:8080}

spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:dating_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never

jwt.secret=${JWT_SECRET:dating-system-secret-key-2024-ai-love-match-platform}
jwt.expiration=86400000

deepseek.api-key=${DEEPSEEK_API_KEY:}
deepseek.base-url=https://api.deepseek.com
deepseek.model=deepseek-chat
deepseek.max-tokens=500
deepseek.temperature=0.7

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true
management.endpoint.info.enabled=true

logging.level.com.dating.datingsystem=info
logging.level.org.springframework.security=info

resilience4j.circuitbreaker.instances.chat.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.chat.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.chat.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.chat.sliding-window-type=count-based
resilience4j.circuitbreaker.instances.chat.sliding-window-size=10
resilience4j.circuitbreaker.instances.chat.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.chat.slow-call-duration-threshold=2s
resilience4j.circuitbreaker.instances.chat.slow-call-rate-threshold=50

resilience4j.circuitbreaker.instances.match.failure-rate-threshold=30
resilience4j.circuitbreaker.instances.match.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.match.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.match.sliding-window-type=count-based
resilience4j.circuitbreaker.instances.match.sliding-window-size=10
resilience4j.circuitbreaker.instances.match.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.match.slow-call-duration-threshold=5s
resilience4j.circuitbreaker.instances.match.slow-call-rate-threshold=50

resilience4j.circuitbreaker.instances.vip.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.vip.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.vip.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.vip.sliding-window-type=count-based
resilience4j.circuitbreaker.instances.vip.sliding-window-size=10
resilience4j.circuitbreaker.instances.vip.minimum-number-of-calls=5

resilience4j.circuitbreaker.instances.matchmaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.matchmaker.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.matchmaker.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.matchmaker.sliding-window-type=count-based
resilience4j.circuitbreaker.instances.matchmaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.matchmaker.minimum-number-of-calls=5

resilience4j.retry.instances.vip-retry.max-attempts=3
resilience4j.retry.instances.vip-retry.wait-duration=1s
resilience4j.retry.instances.vip-retry.enable-exponential-backoff=true
resilience4j.retry.instances.vip-retry.exponential-backoff-multiplier=2

resilience4j.ratelimiter.instances.chat.limit-for-period=10
resilience4j.ratelimiter.instances.chat.limit-refresh-period=1s
resilience4j.ratelimiter.instances.chat.timeout-duration=5s

resilience4j.ratelimiter.instances.match.limit-for-period=20
resilience4j.ratelimiter.instances.match.limit-refresh-period=1s
resilience4j.ratelimiter.instances.match.timeout-duration=5s

management.health.circuitbreakers.enabled=true
management.endpoint.health.show-details=always
